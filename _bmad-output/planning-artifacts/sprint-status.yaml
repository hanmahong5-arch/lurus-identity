  stories:
    - id: "11.1"
      title: "Zitadel JWKS JWT 验证"
      epic: epic-11
      status: done
      priority: P0
      points: 3
      owner: ""
      acceptance_criteria:
        - "从 Zitadel JWKS 端点动态获取公钥并缓存（TTL 1h，支持强制刷新）"
        - "JWT 签名、exp、iss、aud 全部验证；无效 token 返回 401"
        - "单元测试覆盖：正常 token、过期、错误签名、缺失字段"

    - id: "11.2"
      title: "Admin 角色验证中间件"
      epic: epic-11
      status: done
      priority: P0
      points: 2
      owner: ""
      acceptance_criteria:
        - "Admin API (/admin/v1/*) 必须携带有效 JWT 且 roles 包含 admin"
        - "非 admin 返回 403，未认证返回 401"
        - "角色字段来源可通过常量配置，不硬编码字段名"

    - id: "11.3"
      title: "限流中间件（Rate Limiting）"
      epic: epic-11
      status: done
      priority: P0
      points: 2
      owner: ""
      acceptance_criteria:
        - "基于 Redis 滑动窗口实现，支持 per-IP 与 per-user 两级限流"
        - "限流阈值通过配置注入（不硬编码）"
        - "超限返回 429，响应头含 Retry-After"
        - "限流失败（Redis 不可用）降级为放行并告警，不中断服务"

    - id: "11.4"
