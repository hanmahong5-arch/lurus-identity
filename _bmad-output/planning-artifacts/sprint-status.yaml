      epic: epic-12
      status: done
      priority: P0
      points: 3
      owner: ""
      acceptance_criteria:
        - "每小时执行一次，扫描 current_period_end < now() 且状态为 active 的订阅"
        - "标记为 expired，发布 IDENTITY_EVENTS NATS 事件"
        - "Cron 执行结果写入结构化日志（扫描数、处理数、失败数）"
        - "并发安全：多副本部署时通过 Redis 分布式锁防止重复执行"

    - id: "12.2"
