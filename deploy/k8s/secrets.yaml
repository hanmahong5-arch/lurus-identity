# Placeholder — actual values managed by Sealed Secrets or external-secrets-operator.
# Never commit real credentials here.
apiVersion: v1
kind: Secret
metadata:
  name: lurus-identity-secrets
  namespace: lurus-identity
type: Opaque
stringData:
  # Required: PostgreSQL DSN pointing to identity + billing schemas
  DATABASE_DSN: "postgres://identity_user:CHANGEME@lurus-pg-rw.database.svc:5432/lurus?search_path=identity,billing,public"
  # Required: Shared key for /internal/v1/* endpoints (used by lurus-api, lurus-gushen, etc.)
  INTERNAL_API_KEY: "CHANGEME_RANDOM_64_CHARS"
  # Required: Zitadel OIDC configuration
  ZITADEL_ISSUER: "https://auth.lurus.cn"
  ZITADEL_JWKS_URL: "https://auth.lurus.cn/oauth/v2/keys"
  ZITADEL_AUDIENCE: ""  # Set to Zitadel project ID if audience validation is required
  # Optional: Redis password (leave empty if no auth)
  REDIS_PASSWORD: ""
  # Optional: Payment providers
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  EPAY_PARTNER_ID: ""
  EPAY_KEY: ""
  CREEM_API_KEY: ""
  CREEM_WEBHOOK_SECRET: ""
